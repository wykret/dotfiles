
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.

# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

autogenerated = 0 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=HDMI-A-2,1920x1080@60.00000,0x371,mirror,eDP-1
monitor=eDP-1,1366x768@75,0x74,1
monitor=HDMI-A-2,1920x1080,1366x0,1
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
# Execute your favorite apps at launch
exec-once = hyprpm reload -n
exec-once = ~/.config/hypr/startup.sh
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
# Set programs that you use
$browser1 = firefox
$terminal = kitty
$fileManager = kitty -e ranger
#$menu = /home/lucas/.config/rofi/launchers/type-2/launcher.sh
$menu=rofi -show drun
$suspend = systemctl suspend

# Some default env vars.
#exec-once = hyprctl setcursor rose-pine-cursor-hyprland 24
env = XCURSOR_SIZE,18
#env = HYPRCURSOR_THEME,rose-pine-cursor-hyprland
#env = HYPRCURSOR_SIZE,24
#env = XCURSOR_THEME,rose-pine-cursor
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = br, ru
    kb_variant =
    kb_model =
    kb_options=grp:alt_shift_toggle
    kb_rules =
    follow_mouse = 1

    touchpad {
        natural_scroll = no
        disable_while_typing = no
    }

    sensitivity = -0.1 # -1.0 - 1.0, 0 means no modification.
}
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 4
    #gaps_out = 10
    gaps_out = 4
    border_size = 2
    #col.active_border = rgba(555fffa2)
    col.active_border = rgba(8891fda2)
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    
    blur {
        enabled = true
        size = 6
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

windowrule = opacity 0.9, ^(Spotify)(.*)$
windowrule = opacity 0.85, ^(nvim)(.*)$
#windowrule = opacity 0.75, ^(kitty)(.*)$
animations {
    enabled = no
    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    #animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    #no_gaps_when_only = true
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    smart_resizing = true
    no_gaps_when_only = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = yes
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    enable_swallow = true;
    swallow_regex = ^(kitty)$
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
#device: epic-mouse-v1 {
    #sensitivity = -0.5
#}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
#windowrulev2 = opacity 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$ windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
windowrulev2 = float, class:Conky
windowrulev2 = pseudo, class:Conky
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, B, exec, $browser1
#bind = $mainMod SHIFT, d, exec,firefox --new-window https://discord.com/app
bind = $mainMod SHIFT, d, exec, discord
bind = $mainMod SHIFT,X ,exec,wlogout
bind = $mainMod, D, exec,dmenu-wl_run -i 
bind = $mainMod, t, exec,~/WebApps/deepl-linux-x64/deepl
bind = $mainMod, n, exec,~/.local/bin/luz-noturna 
bind = $mainMod SHIFT, n, exec, swaync-client -t -sw
bind = $mainMod, a, exec,  pkill rofi || ani-cli --rofi
#bind = $mainMod SHIFT, w, exec,firefox --new-window https://web.whatsapp.com
bind = $mainMod SHIFT, w, exec,whatsie
bind = $mainMod SHIFT, escape, exit, 
bind = $mainMod, Q, killactive, 
# bind = $mainMod, E, exec, pkill rofi || rofi -show emoji
bind = $mainMod, E, exec, emote
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, M, exec,~/ouvir-mic-toogle.sh
bind = $mainMod, B, exec, killall -SIGUSR1 waybar 
bind = $mainMod, ccedilla, exec, killall waybar; waybar & disown
bind = $mainMod, u, exec,~/.local/bin/lock & sleep 2; $suspend
bind = $mainMod ALT, u, exec,~/.local/bin/lock & sleep 2; systemctl hibernate
bind = $mainMod SHIFT, u, exec,~/.local/bin/lock
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod Shift, P, togglefloating, 
bind = $mainMod SHIFT, P, pin, 
bind = $mainMod, G, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1

#Brightness
bind=,XF86MonBrightnessDown,exec,brillo -q -U 5 -u 100000 #&& notify-send --icon=/home/lucas/.local/share/icons/sun.png -t 1000 'Brilho' $(brillo)%
binde=ALT,F9,exec,brillo -q -U 5 -u 100000 #&& notify-send --icon=/home/lucas/.local/share/icons/sun.png -t 1000 'Brilho' $(brillo)%
binde=ALT,F10,exec,brillo -q -A 5 -u 100000 #&& notify-send --icon=/home/lucas/.local/share/icons/sun.png -t 1000 'Brilho' $(brillo)%
bind=,XF86MonBrightnessUp, exec,brillo -q -A 5 -u 100000 #&& notify-send --icon=/home/lucas/.local/share/icons/sun.png -t 1000 'Brilho' $(brillo)%

#Audio
bind = $mainMod, C,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
binde = $mainMod,z,exec,pactl set-sink-volume @DEFAULT_SINK@ -5% #&&&& notify-send -t 100 'Volume' $(pactl get-sink-volume @DEFAULT_SINK@|awk '{print $5}')
bind = , XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5% #&&&& notify-send -t 100 'Volume' $(pactl get-sink-volume @DEFAULT_SINK@|awk '{print $5}')
binde = $mainMod, x,exec,pactl set-sink-volume @DEFAULT_SINK@ +5% #&&&& notify-send -t 100 'Volume' $(pactl get-sink-volume @DEFAULT_SINK@|awk '{print $5}')
bind = , XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5% #&&&& notify-send -t 100 'Volume' $(pactl get-sink-volume @DEFAULT_SINK@|awk '{print $5}')

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, h, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, l, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, k, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, j, movefocus, d
#print
bind=$mainMod,S,exec,grim -g "$(slurp)" - | wl-copy
#ind=$mainMod ALT, S, exec,hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - ~/screenshot.png
bind=$mainMod ALT, S, exec,hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - - | wl-copy
bind=,Print,exec,grim - | wl-copy

# Scroll through existing workspaces with mainMod + scroll
bind= $mainMod, mouse_up, workspace, e+1
bind=SUPER,mouse_down,workspace,e-1
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, touchpad_up, workspace, e+1
bind = $mainMod, touchpad_down, workspace, e-1
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod Shift, Tab, workspace ,e-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#Move/resize windows with keyboard
binde = $mainMod CAPS, l, resizeactive, 10 0
binde = $mainMod CAPS, h, resizeactive, -10 0
binde = $mainMod CAPS, k, resizeactive, 0 -10
binde = $mainMod CAPS, j, resizeactive, 0 10
binde = $mainMod CAPS, right, resizeactive, 10 0
binde = $mainMod CAPS, left, resizeactive, -10 0
binde = $mainMod CAPS, up, resizeactive, 0 -10
binde = $mainMod CAPS, down, resizeactive, 0 10
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER Shift, K, movewindow, u
bind = SUPER Shift, J, movewindow, d 

